openapi: 3.1.0
info:
  title: Support Triage Console Contract
  version: 1.0.0
paths:
  /tickets:
    get:
      summary: List tickets for the inbox
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: priority
          schema:
            type: string
        - in: query
          name: sla_risk
          schema:
            type: string
  /tickets/{ticketId}:
    get:
      summary: Read a single ticket detail
  /tickets/{ticketId}/assign:
    post:
      summary: Assign a ticket owner
  /tickets/{ticketId}/status:
    post:
      summary: Update ticket status
  /tickets/{ticketId}/notes:
    post:
      summary: Append an internal note
